<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D.O.S.E - Entry</title>
    <meta
      name="description"
      content="Entry page của D.O.S.E, điều hướng vào trang home chính trong thư mục pages."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Noto+Serif+Display:wght@600;700;800&display=swap"
    />
    <style>
      :root {
        --bg: #fffdf9;
        --surface: rgba(255, 253, 249, 0.94);
        --border: #e2e8f0;
        --text: #1e1e2f;
        --muted: #475569;
        --heading: #0f172a;
        --primary: #2e3192;
        --secondary: #9d94ff;
        --shadow: 0 18px 44px rgba(46, 49, 146, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: "Be Vietnam Pro", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(157, 148, 255, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 85% 20%, rgba(167, 243, 208, 0.15) 0%, transparent 30%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      }

      .entry-shell {
        width: min(42rem, 100%);
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 2rem;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .entry-mark {
        width: 3.25rem;
        height: 3.25rem;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--primary) 0%, #79a78c 100%);
        color: #fff;
        font-size: 1.6rem;
        font-weight: 800;
      }

      h1 {
        margin: 1rem 0 0.5rem;
        font-family: "Noto Serif Display", serif;
        font-size: clamp(2rem, 5vw, 3.25rem);
        line-height: 1.1;
        color: var(--heading);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .entry-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      .entry-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        padding: 0.8rem 1.1rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .entry-btn--primary {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: #fff;
      }

      .entry-btn--ghost {
        border: 1px solid var(--border);
        color: var(--text);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="entry-shell">
      <span class="entry-mark" aria-hidden="true">D</span>
      <h1>D.O.S.E đang mở trang Home chính.</h1>
      <p>
        `index.html` hiện đóng vai trò entry point kết nối, tương tự root entry trong ứng dụng React.
        Nếu trình duyệt chưa tự chuyển, bạn có thể mở trang Home bên dưới.
      </p>
      <div class="entry-actions">
        <a class="entry-btn entry-btn--primary" href="pages/home.html">Vào Home</a>
        <a class="entry-btn entry-btn--ghost" href="pages/dashboard.html">Mở Dashboard</a>
      </div>
    </main>
    <script>
      const nextUrl = `pages/home.html${window.location.hash || ""}`;
      window.location.replace(nextUrl);
    </script>
  </body>
</html>
